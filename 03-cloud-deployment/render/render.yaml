# ============================================================
# render.yaml — Infrastructure as Code cho Render
#
# Docs: https://render.com/docs/blueprint-spec
# Commit file này vào git → Render tự sync infrastructure.
# ============================================================

services:
  # ──────────────────────────────────────
  # Web Service — AI Agent
  # ──────────────────────────────────────
  - type: web
    name: ai-agent
    runtime: python
    region: singapore
    plan: free
    rootDir: 06-lab-complete

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: REDIS_URL
        fromService:
          type: redis
          name: agent-cache
          property: connectionString
      - key: AGENT_API_KEY
        generateValue: true
      - key: DAILY_BUDGET_USD
        value: "5.0"
      - key: RATE_LIMIT_PER_MINUTE
        value: "20"

  # ──────────────────────────────────────
  # Redis
  # ──────────────────────────────────────
  - type: redis
    name: agent-cache
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

# ============================================================
